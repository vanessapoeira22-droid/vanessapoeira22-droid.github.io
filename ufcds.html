  <style>
    :root {
      --black: #0d0d0d;
      --dark: #1a1a1a;
      --gray: #3a3a3a;
      --gray-mid: #888;
      --gray-light: #cccccc;
      --pink: #e8005a;
      --pink-light: #ff3378;
      --white: #f5f5f5;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.7;
    }
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(13,13,13,0.97);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--gray);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 64px;
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--pink);
      letter-spacing: 0.05em;
      text-decoration: none;
    }
    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
    }
    .nav-links a {
      color: var(--gray-light);
      text-decoration: none;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
      padding: 4px 0;
      border-bottom: 2px solid transparent;
    }
    .nav-links a:hover { color: var(--pink); border-bottom-color: var(--pink); }
    .nav-links a.active { color: var(--pink); border-bottom-color: var(--pink); }

    main {
      padding: 120px 48px 100px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .page-label {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--pink);
      margin-bottom: 16px;
    }
    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 700;
      color: var(--white);
      margin-bottom: 16px;
      border-bottom: 1px solid var(--gray);
      padding-bottom: 24px;
    }
    .page-intro {
      font-size: 0.9rem;
      color: var(--gray-mid);
      margin-bottom: 40px;
    }
    .page-intro strong { color: var(--pink); }

    /* UFCD ACCORDION */
    .ufcd-list { display: flex; flex-direction: column; gap: 8px; }

    .ufcd-item {
      background: var(--dark);
      border: 1px solid var(--gray);
      border-left: 3px solid var(--gray);
      border-radius: 2px;
      overflow: hidden;
      transition: border-left-color 0.2s;
    }
    .ufcd-item.open { border-left-color: var(--pink); }

    .ufcd-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      cursor: pointer;
      user-select: none;
      gap: 16px;
    }
    .ufcd-header:hover { background: #222; }

    .ufcd-header-left {
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1;
      min-width: 0;
    }
    .ufcd-code {
      font-size: 0.78rem;
      color: var(--pink-light);
      font-weight: 500;
      white-space: nowrap;
      min-width: 60px;
    }
    .ufcd-name {
      font-size: 0.9rem;
      color: var(--gray-light);
      flex: 1;
    }
    .ufcd-item.open .ufcd-name { color: var(--white); }

    .ufcd-chevron {
      flex-shrink: 0;
      color: var(--gray-mid);
      transition: transform 0.3s;
    }
    .ufcd-item.open .ufcd-chevron { transform: rotate(180deg); color: var(--pink); }

    .ufcd-body {
      display: none;
      padding: 0 24px 24px;
      border-top: 1px solid var(--gray);
    }
    .ufcd-item.open .ufcd-body { display: block; }

    .ufcd-sections {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 20px;
    }

    .ufcd-section {
      background: var(--black);
      border: 1px dashed var(--gray);
      border-radius: 2px;
      padding: 20px;
    }
    .ufcd-section h4 {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--pink);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ufcd-section p {
      font-size: 0.85rem;
      color: var(--gray-mid);
    }
    .ufcd-section a {
      color: var(--pink);
      text-decoration: none;
      transition: color 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .ufcd-section a:hover {
      color: var(--pink-light);
      text-decoration: underline;
    }

    .no-link {
      color: var(--gray-mid);
      font-style: italic;
    }

    footer {
      border-top: 1px solid var(--gray);
      text-align: center;
      padding: 32px 48px;
      color: var(--gray-mid);
      font-size: 0.8rem;
    }
    footer span { color: var(--pink); }

    @media (max-width: 768px) {
      nav { padding: 0 20px; }
      .nav-links { gap: 16px; }
      main { padding: 100px 20px 60px; }
      .ufcd-sections { grid-template-columns: 1fr; }
    }
  </style>
</head>
